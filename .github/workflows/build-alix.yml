name: Build ALIX Images

on:
  push:
    branches: [ main ]
    paths:
      - 'flake.nix'
      - 'flake.lock'
      - 'hosts/**'
      - 'modules/**'
      - 'lib/**'
      - 'config/**'
      - 'tools/**'
      - '.github/workflows/build-alix.yml'
  pull_request:
    branches: [ main ]

jobs:
  # Quick evaluation check — catches module errors early without building
  evaluate:
    name: Evaluate NixOS configs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Evaluate alix-networkd
        run: |
          nix eval .#nixosConfigurations.alix-networkd.config.system.build.toplevel \
            --accept-flake-config \
            --no-build 2>&1 | tail -20

      - name: Evaluate alix-dnsmasq
        run: |
          nix eval .#nixosConfigurations.alix-dnsmasq.config.system.build.toplevel \
            --accept-flake-config \
            --no-build 2>&1 | tail -20

      - name: Check flake
        run: |
          nix flake check --no-build --accept-flake-config 2>&1 | tail -20

  build-alix:
    name: Build ALIX (${{ matrix.profile }})
    runs-on: ubuntu-22.04
    needs: evaluate
    strategy:
      fail-fast: false
      matrix:
        profile:
          - alix-networkd
          - alix-dnsmasq

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build system toplevel (${{ matrix.profile }})
        run: |
          nix build .#nixosConfigurations.${{ matrix.profile }}.config.system.build.toplevel \
            --accept-flake-config \
            --print-build-logs

      - name: Check closure size
        run: |
          STORE_PATH=$(readlink -f result)
          if [ -d "$STORE_PATH" ]; then
            echo "### ${{ matrix.profile }} Closure Size" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            nix path-info -Sh "$STORE_PATH" | tee -a $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Closure: failed to resolve store path"
            exit 1
          fi

      - name: Top 30 largest packages
        if: always()
        run: |
          STORE_PATH=$(readlink -f result 2>/dev/null)
          if [ -d "$STORE_PATH" ]; then
            echo "### ${{ matrix.profile }} Top 30 Largest Packages" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            nix path-info -rSh "$STORE_PATH" | sort -rh | head -30 | tee -a $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Build disk image (${{ matrix.profile }})
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Try sdImage first, fall back to diskImage
          nix build .#nixosConfigurations.${{ matrix.profile }}.config.system.build.sdImage \
            --accept-flake-config \
            --print-build-logs 2>&1 || \
          nix build .#nixosConfigurations.${{ matrix.profile }}.config.system.build.diskImage \
            --accept-flake-config \
            --print-build-logs 2>&1 || true

      - name: Compress and upload image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMG=$(find result*/sd-image result*/disk-image -name '*.img' 2>/dev/null | head -1)
          if [ -n "$IMG" ]; then
            cp -L "$IMG" alix-${{ matrix.profile }}.img
            gzip -9 alix-${{ matrix.profile }}.img
            IMAGE_SIZE=$(du -h alix-${{ matrix.profile }}.img.gz | cut -f1)
            echo "### ${{ matrix.profile }} Image Size: \`${IMAGE_SIZE}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ${{ matrix.profile }} Image: build skipped or no image output found" >> $GITHUB_STEP_SUMMARY
          fi

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: alix-${{ matrix.profile }}-image
          path: alix-${{ matrix.profile }}.img.gz
          retention-days: 30
          if-no-files-found: warn

  closure-audit:
    name: Closure audit (${{ matrix.profile }})
    runs-on: ubuntu-22.04
    needs: build-alix
    if: always()
    strategy:
      fail-fast: false
      matrix:
        profile:
          - alix-networkd
          - alix-dnsmasq

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Full closure audit
        run: |
          STORE_PATH=$(nix build .#nixosConfigurations.${{ matrix.profile }}.config.system.build.toplevel --no-link --print-out-paths 2>/dev/null || true)
          if [ -z "$STORE_PATH" ]; then
            echo "Build failed, skipping audit"
            exit 0
          fi
          
          echo "### ${{ matrix.profile }} Top 30 Largest Packages" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          nix path-info -rSh "$STORE_PATH" | sort -rh | head -30 | while read size hash name; do
            echo "${size}  ${name}"
          done | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # Calculate total using nix path-info
          TOTAL_BYTES=$(nix path-info -rS "$STORE_PATH" | awk '{sum += $1} END {printf "%.0f", sum}')
          TOTAL_MB=$(echo "$TOTAL_BYTES" | awk '{printf "%.1f", $1 / 1024 / 1024}')
          echo "Total: ${TOTAL_MB} MB"
          echo "### ${{ matrix.profile }} Total Closure: \`${TOTAL_MB} MB\`" >> $GITHUB_STEP_SUMMARY
          
          # Check against 1GB CF budget
          CF_LIMIT_MB=900
          if [ "$(echo \"$TOTAL_MB > $CF_LIMIT_MB\" | bc -l)" = "1" ]; then
            echo "### ⚠️ OVER BUDGET: ${TOTAL_MB} MB exceeds 900 MB CF budget" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ WITHIN BUDGET: ${TOTAL_MB} MB fits in 900 MB CF budget" >> $GITHUB_STEP_SUMMARY
          fi
