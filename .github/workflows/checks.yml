name: Nix Checks

on:
  pull_request:
    branches: ["main"]

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      checks: ${{ steps.list.outputs.checks }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: List available checks
        id: list
        run: |
          checks=$(nix eval .#checks.x86_64-linux --apply 'builtins.attrNames' --json)
          echo "checks=$checks" >> "$GITHUB_OUTPUT"

  run:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: ${{ fromJSON(needs.matrix.outputs.checks) }}
    name: "check / ${{ matrix.check }}"
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM for NixOS VM tests
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            system-features = nixos-test kvm

      - name: Run check
        run: nix build ".#checks.x86_64-linux.${{ matrix.check }}" --no-link --print-build-logs
