      # sops integration
      sops:
        format: "yaml"
        key: ["gateway-secrets", "tls", "gateway-cert"]

  # WireGuard VPN keys
  vpn:
    wireguard:
      type: wireguardKey
      private_key: "4P5MHmLf1HW/3b1pV3EgZ9Rml/KWXdqxqRPyoVQlYH0="
      preshared_keys:
        peer1: "8P5MHmLf1HW/3b1pV3EgZ9Rml/KWXdqxqRPyoVQlYH1="
        peer2: "9P5MHmLf1HW/3b1pV3EgZ9Rml/KWXdqxqRPyoVQlYH2="
      description: "WireGuard VPN keys for site-to-site connections"
      
      rotation:
        enabled: false  # Manual rotation for VPN keys
        interval: "365d"
        backup: true
      
      access:
        root: ["read", "write", "delete"]
        systemd-network: ["read"]
      
      sops:
        format: "yaml"
        key: ["gateway-secrets", "vpn", "wireguard"]

  # DNS TSIG keys for dynamic updates
  dns:
    tsig_keys:
      ddns-update:
        type: tsigKey
        key: "c2VjcmV0LXRzaWcta2V5LWRhdGE="
        algorithm: "hmac-sha256"
        name: "ddns-update"
        description: "TSIG key for dynamic DNS updates"
        
        rotation:
          enabled: true
          interval: "180d"
          backup: true
        
        access:
          root: ["read", "write", "delete"]
          bind: ["read"]
          nsd: ["read"]
        
        sops:
          format: "yaml"
          key: ["gateway-secrets", "dns", "tsig_keys", "ddns-update"]

  # Monitoring and API keys
  monitoring:
    prometheus-remote:
      type: apiKey
      key: "test-api-key-1234567890abcdef"
      description: "Prometheus remote write API key"
      
      rotation:
        enabled: true
        interval: "90d"
        backup: true
      
      access:
        root: ["read", "write", "delete"]
        prometheus: ["read"]
      
      sops:
        format: "yaml"
        key: ["gateway-secrets", "monitoring", "prometheus-remote"]
    
    grafana-admin:
      type: apiKey
      key: "grafana-admin-key-abcdef1234567890"
      description: "Grafana admin API key"
      
      rotation:
        enabled: true
        interval: "60d"
        backup: true
      
      access:
        root: ["read", "write", "delete"]
        grafana: ["read"]
      
      sops:
        format: "yaml"
        key: ["gateway-secrets", "monitoring", "grafana-admin"]

  # Database credentials
  databases:
    metrics-db:
      type: databasePassword
      password: "secure-metrics-database-password"
      description: "Metrics database password"
      
      rotation:
        enabled: true
        interval: "90d"
        backup: true
      
      access:
        root: ["read", "write", "delete"]
        postgres: ["read"]
        prometheus: ["read"]
      
      sops:
        format: "yaml"
        key: ["gateway-secrets", "databases", "metrics-db"]
    
    logs-db:
      type: databasePassword
      password: "secure-logs-database-password"
      description: "Logs database password"
      
      rotation:
        enabled: true
        interval: "90d"
        backup: true
      
      access:
        root: ["read", "write", "delete"]
        postgres: ["read"]
        loki: ["read"]
      
      sops:
        format: "yaml"
        key: ["gateway-secrets", "databases", "logs-db"]