# SOPS Example Configuration
# This file demonstrates how to use sops-nix with gateway secrets management

# First, install sops:
# nix-env -iA nixpkgs.sops

# Create GPG key pair or use existing age keys:
# gpg --full-generate-key
# or
# age-keygen -o key.txt

# Configure .sops.yaml:
creation_rules:
  # Gateway secrets encryption rules
  - path_regex: secrets/gateway-secrets\.yaml$
    key_groups:
      - age:
          - age1ql3z7hjy54pw3hyww5p5t067chj8q7s3x2lq5lfxp2e6p0x5m9ysqk7l9x
        pgp:
          - FINGERPRINT1
      - age:
          - age1r2q8z7hjy54pw3hyww5p5t067chj8q7s3x2lq5lfxp2e6p0x5m9ysqk7l9x
        pgp:
          - FINGERPRINT2
  
  # Environment-specific secrets
  - path_regex: secrets/development/.*\.yaml$
    key_groups:
      - age:
          - age1ql3z7hjy54pw3hyww5p5t067chj8q7s3x2lq5lfxp2e6p0x5m9ysqk7l9x
        pgp:
          - FINGERPRINT1
  
  - path_regex: secrets/staging/.*\.yaml$
    key_groups:
      - age:
          - age1ql3z7hjy54pw3hyww5p5t067chj8q7s3x2lq5lfxp2e6p0x5m9ysqk7l9x
          - age1r2q8z7hjy54pw3hyww5p5t067chj8q7s3x2lq5lfxp2e6p0x5m9ysqk7l9x
        pgp:
          - FINGERPRINT1
          - FINGERPRINT2
  
  - path_regex: secrets/production/.*\.yaml$
    key_groups:
      - age:
          - age1ql3z7hjy54pw3hyww5p5t067chj8q7s3x2lq5lfxp2e6p0x5m9ysqk7l9x
          - age1r2q8z7hjy54pw3hyww5p5t067chj8q7s3x2lq5lfxp2e6p0x5m9ysqk7l9x
        pgp:
          - FINGERPRINT1
          - FINGERPRINT2
      - age:
          - age1t3q8z7hjy54pw3hyww5p5t067chj8q7s3x2lq5lfxp2e6p0x5m9ysqk7l9x
        pgp:
          - FINGERPRINT3  # Security team key

# Encrypt secrets:
# sops --encrypt --kms 'arn:aws:kms:us-east-1:123456789012:key/abcd1234-5678-90ab-cdef-1234567890ab' secrets/gateway-secrets.yaml > secrets/gateway-secrets.yaml.enc

# Or with GPG:
# sops --pgp 'FINGERPRINT1,FINGERPRINT2' --encrypt secrets/gateway-secrets.yaml

# Or with age:
# sops --age 'age1ql3z7hjy54pw3hyww5p5t067chj8q7s3x2lq5lfxp2e6p0x5m9ysqk7l9x,age1r2q8z7hjy54pw3hyww5p5t067chj8q7s3x2lq5lfxp2e6p0x5m9ysqk7l9x' --encrypt secrets/gateway-secrets.yaml

# Edit secrets:
# sops secrets/gateway-secrets.yaml

# Extract specific secrets:
# sops --decrypt --extract '["gateway-secrets"]["tls"]["gateway-cert"]["certificate"]' secrets/gateway-secrets.yaml

# Rotate keys:
# sops --rotate --kms 'arn:aws:kms:us-east-1:123456789012:key/abcd1234-5678-90ab-cdef-1234567890ab' secrets/gateway-secrets.yaml