# sops-nix configuration example
# This file should be encrypted with: sops --encrypt --kms 'arn:aws:kms:...' gateway-secrets.yaml

# Example sops.yaml configuration file
creation_rules:
  - path_regex: secrets/.*\.yaml$
    kms: 'arn:aws:kms:us-east-1:123456789012:key/abcd1234-5678-90ef-ghij-klmnopqrstuv'
    age:
      - age1ql3z7hjy54pw3hyww5p5v06xfjpxxv0jhz0x9f4mwrjgkz2v5fpsq0d8a2
    pgp:
      - ABCDEF1234567890ABCD1234567890ABCD123456

